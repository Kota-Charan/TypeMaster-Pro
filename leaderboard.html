    <div class="app-container">

        <header>

                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Engineering_Pro</td>
                        <td>95</td>
                        <td>Medium</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>TypingWizard</td>
                        <td>88</td>
                        <td>Hard</td>
                    </tr>
                </tbody>
            </table>

            <div class="session-controls" style="margin-top: 25px;">
                <button id="startBtn" onclick="window.location.href='typing.html'">New Session</button>
            </div>
        </main>
    </div>

</html>
